<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lanyard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Syne:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ── THEMES ── */
[data-theme="dark"] {
  --bg:#0e0f11; --surface:#16181c; --surface2:#1e2128; --border:#2a2d35;
  --text:#e8e9ec; --muted:#6b7080; --accent:#4fffb0; --accent2:#7b6cff;
  --danger:#ff5f6d; --bubble-me:#1e2840; --bubble-me-border:#7b6cff;
  --shadow:rgba(0,0,0,0.4);
}
[data-theme="light"] {
  --bg:#f4f5f7; --surface:#ffffff; --surface2:#f0f1f3; --border:#dde0e7;
  --text:#1a1c23; --muted:#8a8fa8; --accent:#0a8f5c; --accent2:#5b4de8;
  --danger:#e53935; --bubble-me:#ede9ff; --bubble-me-border:#5b4de8;
  --shadow:rgba(0,0,0,0.08);
}
[data-theme="ocean"] {
  --bg:#060d1f; --surface:#0c1730; --surface2:#112040; --border:#1a3050;
  --text:#c8ddf5; --muted:#5878a0; --accent:#38c5f5; --accent2:#4d8fff;
  --danger:#ff6b6b; --bubble-me:#0d2545; --bubble-me-border:#4d8fff;
  --shadow:rgba(0,0,0,0.5);
}
[data-theme="sakura"] {
  --bg:#fff5f7; --surface:#ffffff; --surface2:#fef0f3; --border:#f5c6d3;
  --text:#3d1520; --muted:#b07080; --accent:#e05580; --accent2:#c2396a;
  --danger:#d32f2f; --bubble-me:#fce4ec; --bubble-me-border:#e05580;
  --shadow:rgba(200,80,100,0.1);
}
[data-theme="forest"] {
  --bg:#0d1810; --surface:#132018; --surface2:#1a2c1e; --border:#243d28;
  --text:#c8e6c9; --muted:#5a8060; --accent:#69f07a; --accent2:#40c754;
  --danger:#ff7043; --bubble-me:#1b3320; --bubble-me-border:#40c754;
  --shadow:rgba(0,0,0,0.4);
}
[data-theme="amber"] {
  --bg:#1a1200; --surface:#221a00; --surface2:#2e2400; --border:#3d3000;
  --text:#fff3cc; --muted:#8a7040; --accent:#ffc107; --accent2:#ff9800;
  --danger:#f44336; --bubble-me:#2e2000; --bubble-me-border:#ff9800;
  --shadow:rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; transition: background 0.3s, color 0.3s; }

/* ── SETUP ── */
#setup-screen {
  position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
  background: var(--bg); z-index: 100; transition: opacity 0.3s;
}
#setup-screen.hide { opacity: 0; pointer-events: none; }
.setup-card {
  width: 380px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 36px 32px; box-shadow: 0 12px 40px var(--shadow);
}
.setup-logo { font-size: 22px; font-weight: 600; letter-spacing: 1px; margin-bottom: 4px; }
.setup-logo span { color: var(--accent); }
.setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 26px; font-family: 'IBM Plex Mono', monospace; }
.field-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 7px; display: block; }
.setup-input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.15s; margin-bottom: 18px;
}
.setup-input:focus { border-color: var(--accent); }
.color-row { display: flex; gap: 9px; margin-bottom: 20px; flex-wrap: wrap; }
.color-dot {
  width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; transition: border-color 0.15s, transform 0.1s;
}
.color-dot:hover { transform: scale(1.18); }
.color-dot.selected { border-color: var(--text); }

/* ── AVATAR PICKER ── */
.avatar-grid {
  display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; margin-bottom: 20px;
}
.avatar-opt {
  width: 44px; height: 44px; border-radius: 50%; font-size: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: 2px solid transparent;
  background: var(--surface2); transition: all 0.15s;
  line-height: 1;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
}
.avatar-opt:hover { transform: scale(1.12); border-color: var(--border); }
.avatar-opt.selected { border-color: var(--accent); background: var(--surface); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }

/* ── AVATAR in messages & sidebar ── */
.msg-row { display: flex; align-items: flex-end; gap: 8px; }
.msg-avatar {
  width: 32px; height: 32px; border-radius: 50%; font-size: 18px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  line-height: 1;
}
.msg.me .msg-row { flex-direction: row-reverse; }
.msg.me .msg-body { align-items: flex-end; }
.msg-body { display: flex; flex-direction: column; gap: 3px; min-width: 0; }

.user-avatar {
  width: 28px; height: 28px; border-radius: 50%; font-size: 16px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  background: var(--surface2);
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  line-height: 1;
}

/* Theme selector */
.theme-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 22px; }
.theme-btn {
  padding: 7px 6px; border-radius: 8px; border: 1px solid var(--border); cursor: pointer;
  font-size: 12px; font-family: 'Syne', sans-serif; text-align: center;
  transition: all 0.15s; background: var(--surface2); color: var(--text);
  display: flex; flex-direction: column; align-items: center; gap: 3px;
}
.theme-btn:hover { border-color: var(--accent); }
.theme-btn.selected { border-color: var(--accent); background: var(--surface); }
.theme-swatch { width: 24px; height: 14px; border-radius: 4px; }

.btn-join {
  width: 100%; padding: 12px; background: var(--accent); color: var(--bg);
  border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px;
  font-weight: 600; cursor: pointer; transition: opacity 0.15s;
}
.btn-join:hover { opacity: 0.85; }
.pw-error { font-size: 12px; color: var(--danger); margin-top: -12px; margin-bottom: 14px; display: none; }
.pw-error.show { display: block; }

/* ── MAIN ── */
#app { height: 100vh; display: none; flex-direction: column; }
#app.active { display: flex; }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 18px; height: 50px; border-bottom: 1px solid var(--border);
  background: var(--surface); flex-shrink: 0;
}
.logo { font-size: 15px; font-weight: 600; letter-spacing: 1.5px; cursor: default; }
.logo span { color: var(--accent); }
.header-right { display: flex; align-items: center; gap: 10px; }
.online-pill {
  font-size: 13px; 
  color: var(--muted); font-family: 'IBM Plex Mono', monospace;
  background: var(--surface2); border: 1px solid var(--border);
  padding: 5px 12px; 
  border-radius: 20px;
}
.hbtn {
  background: none; border: 1px solid var(--border); border-radius: 7px;
  color: var(--muted); 
  font-size: 14px; 
  padding: 5px 12px;
  cursor: pointer;
  font-family: 'IBM Plex Mono', monospace; transition: all 0.15s; white-space: nowrap;
}
.hbtn:hover { border-color: var(--accent); color: var(--accent); }

.hbtn.btn-exit:hover { 
  border-color: var(--danger); 
  color: var(--danger); 
}

.main-area { display: flex; flex: 1; overflow: hidden; }

.sidebar-footer {
  margin-top: auto;
  padding: 16px 14px 4px 14px;
  font-size: 11px;
  color: var(--muted);
  font-family: 'IBM Plex Mono', monospace;
  line-height: 1.6;
  opacity: 0.6;
}

/* ── SIDEBAR ── */
.sidebar {
  width: 190px; flex-shrink: 0; border-right: 1px solid var(--border);
  background: var(--surface); display: flex; flex-direction: column; padding: 14px 0; overflow-y: auto;
}
.sidebar-label { 
  font-size: 13px; 
  font-weight: 600; 
  text-transform: uppercase; letter-spacing: 1px; color: var(--muted); padding: 0 14px; margin-bottom: 12px; 
}
.user-item { 
  display: flex; align-items: center; gap: 10px; padding: 8px 14px; 
  font-size: 15px;
  color: var(--muted); 
}
.user-dot { 
  width: 10px; height: 10px;
  border-radius: 50%; flex-shrink: 0; 
}
.user-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* ── CHAT ── */
.chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

#messages {
  flex: 1; overflow-y: auto; padding: 18px 22px;
  display: flex; flex-direction: column; gap: 3px;
  scrollbar-width: thin; scrollbar-color: var(--border) transparent;
}

.msg { display: flex; flex-direction: column; max-width: 74%; margin-bottom: 4px; }
.msg.me { align-self: flex-end; align-items: flex-end; }
.msg.other { align-self: flex-start; align-items: flex-start; }
.msg.system { align-self: center; }

.msg-meta { 
  font-size: 12px;
  color: var(--muted); 
  margin-bottom: 4px; 
  font-family: 'IBM Plex Mono', monospace; 
}
.msg-meta .nick { font-weight: 500; margin-right: 5px; }

.bubble {
  padding: 10px 16px; 
  border-radius: 14px 14px 14px 4px; 
  font-size: 18px; 
  line-height: 1.6;
  word-break: break-word; 
  background: var(--surface); 
  border: 1px solid var(--border); 
  color: var(--text);

  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", 'Syne', sans-serif;
}
.msg.me .bubble { background: var(--bubble-me); border-color: var(--bubble-me-border); border-radius: 14px 14px 4px 14px; }

.system-msg {
  font-size: 11px; color: var(--muted); font-family: 'IBM Plex Mono', monospace;
  background: var(--surface2); border: 1px solid var(--border); padding: 4px 12px; border-radius: 20px;
}

.file-bubble {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px; border-radius: 12px;
  background: var(--surface); border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s;
}
.file-bubble:hover { border-color: var(--accent); }
.file-icon { font-size: 20px; flex-shrink: 0; }
.file-info { display: flex; flex-direction: column; min-width: 0; }
.file-name { font-size: 13px; font-family: 'IBM Plex Mono', monospace; color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.file-size { font-size: 11px; color: var(--muted); margin-top: 2px; }
.enc-badge { display: none; align-items: center; gap: 4px; font-size: 10px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; margin-top: 4px; opacity: 0.65; }

/* ── 图片气泡样式 ── */
.img-bubble {
  padding: 6px; border-radius: 14px; background: var(--surface);
  border: 1px solid var(--border); cursor: pointer; transition: border-color 0.15s;
  display: inline-block; line-height: 0; position: relative;
}
.img-bubble:hover { border-color: var(--accent); }
.img-bubble img {
  max-width: 280px; max-height: 280px; object-fit: contain;
  border-radius: 8px; transition: opacity 0.3s;
}

/* ── INPUT BAR ── */
.input-bar {
  border-top: 1px solid var(--border); padding: 12px 16px;
  display: flex; align-items: flex-end; gap: 8px; background: var(--surface); flex-shrink: 0; position: relative;
}
.ibar-left { display: flex; gap: 6px; }
.ibtn {
  background: none; border: 1px solid var(--border); border-radius: 9px;
  width: 44px; 
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: center;
  
  color: var(--muted); cursor: pointer; 
  font-size: 22px; 
  transition: all 0.15s; flex-shrink: 0;
  padding: 0; 
}

.ibtn:hover { 
  border-color: var(--accent); 
  color: var(--accent); 
  background: var(--surface2); 
}
#msg-input {
  flex: 1; background: var(--bg); border: 1px solid var(--border); border-radius: 9px;
  padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 14px;
  outline: none; transition: border-color 0.15s; resize: none; 
  min-height: 64px; 
  max-height: 160px; 
  overflow-y: auto; line-height: 1.5;
  scrollbar-width: thin; 
  scrollbar-color: var(--border) transparent; 
}

#msg-input::-webkit-scrollbar {
  width: 6px;
}
#msg-input::-webkit-scrollbar-track {
  background: transparent;
  margin: 6px 0; 
}
#msg-input::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
#msg-input::-webkit-scrollbar-thumb:hover {
  background: var(--muted);
}
#msg-input:focus { border-color: var(--accent2); }
.btn-send {
  background: var(--accent2); border: none; border-radius: 9px; padding: 9px 16px;
  color: #fff; font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s; flex-shrink: 0; height: 38px;
}
.btn-send:hover { opacity: 0.85; }

/* ── EMOJI PICKER ── */
#emoji-panel {
  display: none; position: absolute; bottom: 64px; left: 14px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  padding: 14px; box-shadow: 0 8px 30px var(--shadow); z-index: 50; 
  width: max-content; 
  max-width: calc(100vw - 28px); 
}
#emoji-panel.open { display: block; }
.emoji-search {
  width: 100%; background: var(--bg); border: 1px solid var(--border);
  border-radius: 7px; padding: 6px 10px; color: var(--text); font-size: 13px;
  outline: none; margin-bottom: 8px; font-family: 'Syne', sans-serif;
}
.emoji-search:focus { border-color: var(--accent); }
.emoji-tabs { display: flex; gap: 4px; margin-bottom: 8px; overflow-x: auto; padding-bottom: 2px; }
.emoji-tab {
  font-size: 16px; padding: 6px 8px; border-radius: 6px; cursor: pointer;
  background: none; border: 1px solid transparent; transition: all 0.12s; flex-shrink: 0;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
}
.emoji-tab:hover, .emoji-tab.active { background: var(--surface2); border-color: var(--border); }
.emoji-grid { 
  display: grid; 
  grid-template-columns: repeat(8, 38px); 
  gap: 6px; 
  max-height: 240px;
  overflow-y: auto; 
  overflow-x: hidden;
  padding-right: 4px; 
}
.emoji-btn {
  font-size: 24px; 
  width: 38px; 
  height: 38px;
  display: flex; align-items: center; justify-content: center; 
  padding: 0; border-radius: 8px; cursor: pointer;
  background: none; border: none; transition: background 0.1s; line-height: 1;
  font-family: "Apple Color Emoji", "Segoe UI Emoji", "Noto Color Emoji", sans-serif;
  text-shadow: 0 0 2px rgba(255, 255, 255, 0.15);
}
.emoji-btn:hover { background: var(--surface2); }

/* ── QR MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.55);
  align-items: center; justify-content: center; z-index: 200;
}
.modal-overlay.open { display: flex; }
.modal-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: 18px;
  padding: 30px; text-align: center; min-width: 270px; box-shadow: 0 16px 50px var(--shadow);
}
.modal-card h3 { font-size: 16px; margin-bottom: 6px; }
.modal-card p  { font-size: 12px; color: var(--muted); margin-bottom: 16px; font-family: 'IBM Plex Mono', monospace; }
.modal-card img { width: 190px; height: 190px; border-radius: 8px; background: #fff; padding: 8px; }
.qr-url { font-size: 12px; color: var(--accent); font-family: 'IBM Plex Mono', monospace; margin-top: 10px; }
.btn-close {
  margin-top: 14px; background: none; border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 18px; color: var(--muted); cursor: pointer; font-family: 'Syne', sans-serif;
  transition: all 0.15s;
}
.btn-close:hover { border-color: var(--danger); color: var(--danger); }

/* ── SETTINGS MODAL ── */
.settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 14px 0; }
.settings-grid .theme-btn { padding: 10px 8px; }

/* ── DRAG ── */
#drag-overlay {
  display: none; position: fixed; inset: 0;
  border: 3px dashed var(--accent); background: rgba(79,255,176,0.05);
  align-items: center; justify-content: center; z-index: 50;
  font-size: 22px; color: var(--accent); font-weight: 600; pointer-events: none;
}
#drag-overlay.show { display: flex; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 78px; left: 50%; transform: translateX(-50%);
  background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
  padding: 7px 18px; font-size: 13px; font-family: 'IBM Plex Mono', monospace;
  opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 300; white-space: nowrap;
}
#toast.show { opacity: 1; }

#emoji-panel ::-webkit-scrollbar {
  width: 6px;
  height: 6px;
}
#emoji-panel ::-webkit-scrollbar-track {
  background: transparent;
}
#emoji-panel ::-webkit-scrollbar-thumb {
  background: var(--border);
  border-radius: 10px;
}
#emoji-panel ::-webkit-scrollbar-thumb:hover {
  background: var(--muted);
}

/* ── PROGRESS UI ── */
#progress-box {
  display: none; position: fixed; top: 64px; right: 20px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px; box-shadow: 0 8px 30px var(--shadow);
  z-index: 400; width: 260px;
}
#progress-box.show { display: block; }
#progress-text { 
  font-size: 13px; font-family: 'IBM Plex Mono', monospace; 
  margin-bottom: 8px; color: var(--accent); 
}
.progress-bar { 
  width: 100%; height: 6px; background: var(--surface2); 
  border-radius: 3px; overflow: hidden; 
}
#progress-fill { 
  width: 0%; height: 100%; background: var(--accent); 
  transition: width 0.15s linear; 
}

.ibar-left { position: relative; display: flex; gap: 6px; }

#mini-progress {
  opacity: 0; pointer-events: none;
  position: absolute; 
  bottom: 54px; 
  left: 0; 
  width: 100%; 
  height: 6px; 
  background: var(--surface2);
  border-radius: 10px;
  overflow: hidden;
  transition: opacity 0.2s;
}
#mini-progress.show { opacity: 1; }

#mini-progress-fill {
  width: 0%; height: 100%; 
  background: var(--accent); 
  border-radius: 10px;
  transition: width 0.15s linear;
}

@media (max-width: 600px) { .sidebar { display: none; } }

</style>
</head>
<body data-theme="light">

<!-- ── SETUP ── -->
<div id="setup-screen">
  <div class="setup-card">
    <div class="setup-logo" id="setup-logo-text">LAN<span>YARD</span></div>
    <div class="setup-sub">端到端加密 · 局域网通信</div>

    <label class="field-label">昵称</label>
    <input type="text" id="nickname-input" class="setup-input" placeholder="输入你的名字" maxlength="20">

    <label class="field-label">颜色</label>
    <div class="color-row" id="color-picker"></div>

    <label class="field-label">头像</label>
    <div class="avatar-grid" id="avatar-picker"></div>

    <label class="field-label">主题</label>
    <div class="theme-grid" id="theme-picker"></div>

    <div id="pw-section" style="display:none">
      <label class="field-label">房间密码</label>
      <input type="password" id="pw-input" class="setup-input" placeholder="输入房间密码">
      <div class="pw-error" id="pw-error">密码错误，请重试</div>
    </div>

    <button class="btn-join" id="btn-join" onclick="joinRoom()">进入房间</button>
  </div>
</div>

<!-- ── MAIN APP ── -->
<div id="app">
  <header>
    <div class="logo" id="header-logo">LAN<span>YARD</span></div>
    <div class="header-right">
      <span class="online-pill" id="online-count">0 在线</span>
      <button class="hbtn" onclick="openModal('qr-modal')">📱 扫码</button>
      <button class="hbtn" onclick="openModal('settings-modal')">⚙ 主题</button>
      <button class="hbtn btn-exit" onclick="exitRoom()">🚪 退出</button>
    </div>
  </header>

  <div class="main-area">
    <div class="sidebar">
      <div class="sidebar-label">在线用户</div>
      <div id="user-list"></div>
      <div class="sidebar-footer">
        Lanyard v1.0.0<br>
        By: louis.w 2026
      </div>
    </div>
    <div class="chat-area">
      <div id="messages"></div>
      <div class="input-bar">
        <div class="ibar-left">
          <div id="mini-progress"><div id="mini-progress-fill"></div></div>
          <button class="ibtn" id="emoji-toggle" onclick="toggleEmoji()" title="Emoji">😊</button>
          <button class="ibtn" onclick="document.getElementById('file-input').click()" title="发送文件">📎</button>
        </div>
        <input type="file" id="file-input" style="display:none" onchange="sendFile(this.files[0])">
        <textarea id="msg-input" placeholder="输入消息…（Enter 发送）" rows="1"></textarea>

function buildEmojiPicker() {
  const tabsEl = document.getElementById('emoji-tabs');

  tabsEl.innerHTML = '';
  Object.keys(EMOJI_CATEGORIES).forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'emoji-tab' + (cat === currentCategory ? ' active' : '');

      currentCategory = cat;
      document.querySelectorAll('.emoji-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('emoji-search').value = '';
      renderEmojiGrid(EMOJI_CATEGORIES[cat]);
    };
    tabsEl.appendChild(btn);
  });
  renderEmojiGrid(EMOJI_CATEGORIES[currentCategory]);
}

function renderEmojiGrid(emojis) {
  const grid = document.getElementById('emoji-grid');
  grid.innerHTML = '';
  emojis.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-btn';
    btn.textContent = e;
    btn.onclick = () => insertEmoji(e);
    grid.appendChild(btn);
  });
}

function filterEmoji(query) {
  if (!query.trim()) { renderEmojiGrid(EMOJI_CATEGORIES[currentCategory]); return; }
  // Search across all emojis — basic visual match by showing all when searching
  const all = Object.values(EMOJI_CATEGORIES).flat();
  // Filter: try to match the query against unicode codepoint names (rough approach: show all, let user visually find)
  // For a real search we'd need an emoji name dictionary; here we show the full set filtered to unique
  renderEmojiGrid([...new Set(all)]);
}

function insertEmoji(emoji) {
  const input = document.getElementById('msg-input');
  const start = input.selectionStart, end = input.selectionEnd;
  const val = input.value;
  input.value = val.slice(0, start) + emoji + val.slice(end);
  input.selectionStart = input.selectionEnd = start + emoji.length;
  input.focus();
}

async function joinRoom() {
  const nick = document.getElementById('nickname-input').value.trim();
  if (!nick) { toast('请输入昵称'); return; }
  myNick = nick;

  document.getElementById('btn-join').textContent = '连接中…';
  document.getElementById('pw-error').classList.remove('show');

  try {
    let keyData;
    const pwInput = document.getElementById('pw-input');
    if (pwInput && pwInput.closest('#pw-section').style.display !== 'none') {
      const res = await fetch('/api/auth', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ password: pwInput.value })
      });
      if (!res.ok) {
        document.getElementById('pw-error').classList.add('show');
        document.getElementById('btn-join').textContent = '进入房间';
        return;
      }
      keyData = await res.json();
      authToken = await sha256hex(pwInput.value);
    } else {
      const res = await fetch('/api/key');
      keyData = await res.json();
    }

    const raw = hexToBytes(keyData.key);
    aesKey = await crypto.subtle.importKey('raw', raw, {name:'AES-GCM'}, false, ['encrypt','decrypt']);

    const name = keyData.roomName || 'LANYARD';
    const half = Math.max(1, Math.floor(name.length / 2));
    document.getElementById('header-logo').innerHTML = name.slice(0, half) + '<span>' + name.slice(half) + '</span>';

    sessionStorage.setItem('lan_key', keyData.key);
    sessionStorage.setItem('lan_nick', myNick);
    sessionStorage.setItem('lan_color', myColor);
    sessionStorage.setItem('lan_avatar', myAvatar);
    sessionStorage.setItem('lan_token', authToken);
    sessionStorage.setItem('lan_room', name);

  } catch(e) {
    toast('连接服务器失败'); document.getElementById('btn-join').textContent = '进入房间'; return;
  }

  startWS(); 
}

function exitRoom() {
  if (confirm('确定要退出当前房间吗？')) {

    sessionStorage.clear();

    location.reload();
  }
}

function startWS() {
  document.getElementById('setup-screen').classList.add('hide');
  setTimeout(() => document.getElementById('setup-screen').style.display = 'none', 300);
  document.getElementById('app').classList.add('active');

  const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws?nickname=${encodeURIComponent(myNick)}&color=${encodeURIComponent(myColor)}&token=${encodeURIComponent(authToken)}&avatar=${encodeURIComponent(myAvatar)}`);
  ws.onmessage = onMessage;
  ws.onclose   = () => toast('连接断开，请刷新页面');

  const input = document.getElementById('msg-input');
input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey && !e.altKey) { 
        e.preventDefault(); 
        sendMessage(); 
    }
  });
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 160) + 'px';
  });
  setupDrop();
  setupPaste(); 
}

// ═══════════════════════════════════════
//  RECEIVE
// ═══════════════════════════════════════
async function onMessage(evt) {
  const data = JSON.parse(evt.data);
  if (data.type === 'init') {
    myId = data.myId;
    updateUsers(data.users);
    for (const m of data.history) await renderMsg(m);
    scrollBottom(); return;
  }
  if (data.type === 'users')   { updateUsers(data.users); return; }
  if (data.type === 'system')  { renderSystem(data.text, data.ts); scrollBottom(); return; }
  if (data.type === 'message') { await renderEncMsg(data); scrollBottom(); return; }
  if (data.type === 'file')    { renderFileMsg(data); scrollBottom(); return; }
}

async function renderMsg(m) {
  if (m.type==='system')  { renderSystem(m.text, m.ts); return; }
  if (m.type==='message') { await renderEncMsg(m); return; }
  if (m.type==='file')    { renderFileMsg(m); return; }
}

async function renderEncMsg(data) {
  let text = '[无法解密]';
  try {
    const ct = hexToBytes(data.ciphertext), nonce = hexToBytes(data.nonce);
    const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, aesKey, ct);
    text = new TextDecoder().decode(plain);
  } catch(e) {}
  const isMe = data.id === myId || data.nickname === myNick;
  const av = data.avatar || '😊';
  const color = data.color || '#aaa';
  const div  = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar">${esc(av)}</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="nick" style="color:${esc(color)}">${esc(data.nickname)}</span><span>${esc(data.ts)}</span></div>
        <div class="bubble">${renderText(text)}</div>
      </div>
    </div>`;
  document.getElementById('messages').appendChild(div);
}

function renderText(text) {
  // preserve emoji (unicode) and escape HTML
  return esc(text).replace(/\n/g, '<br>');
}

function renderSystem(text, ts) {
  const div = document.createElement('div');
  div.className = 'msg system';
  div.innerHTML = `<div class="system-msg">${esc(text)} · ${esc(ts)}</div>`;
  document.getElementById('messages').appendChild(div);
}

function renderFileMsg(data) {
  const isMe = data.id === myId || data.sender === myNick;
  const av = data.avatar || '😊';
  const color = data.color || myColor;
  const div  = document.createElement('div');
  div.className = 'msg ' + (isMe ? 'me' : 'other');
  
  div.innerHTML = `
    <div class="msg-row">
      <div class="msg-avatar">${esc(av)}</div>
      <div class="msg-body">
        <div class="msg-meta"><span class="nick" style="color:${esc(color)}">${esc(data.sender)}</span><span>${esc(data.ts)}</span></div>
        <div class="file-bubble" id="bubble-${esc(data.fileId)}" onclick="downloadFile('${esc(data.fileId)}','${esc(data.fileNonce||data.nonce)}','${esc(data.filenameEnc)}','${esc(data.nonce)}')">
          <span class="file-icon">📄</span>
          <div class="file-info">
            <span class="file-name" id="fn-${esc(data.fileId)}">加密文件</span>
            <span class="file-size">${formatBytes(data.size)} · 点击下载解密</span>
          </div>
        </div>
      </div>
    </div>`;
  document.getElementById('messages').appendChild(div);
  
  // 开始解密文件名
  if (data.filenameEnc && data.nonce) {
    decryptText(data.filenameEnc, data.nonce).then(name => {
      const el = document.getElementById('fn-' + data.fileId);
      if (el) el.textContent = name;
      
      const ext = name.split('.').pop().toLowerCase();
      if (['png', 'jpg', 'jpeg', 'gif', 'webp', 'bmp'].includes(ext)) {
        const bubble = document.getElementById('bubble-' + data.fileId);
        if (!bubble) return;
        
        bubble.className = 'img-bubble';
        bubble.innerHTML = `<img id="img-${data.fileId}" src="" alt="图片解密中..." style="opacity: 0.3;">`;
        bubble.onclick = null; 
        
        fetch(`/api/download/${data.fileId}`)
          .then(res => res.arrayBuffer())
          .then(async encBuf => {
            const nonce = hexToBytes(data.fileNonce || data.nonce);

            const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, aesKey, encBuf);
            

            const mime = 'image/' + (ext === 'jpg' ? 'jpeg' : ext);
            const blob = new Blob([plain], {type: mime});
            const url = URL.createObjectURL(blob);
            
            const imgEl = document.getElementById('img-' + data.fileId);
            if (imgEl) {
              imgEl.src = url; 
              imgEl.style.opacity = 1; 
              
              bubble.onclick = () => {
                const a = document.createElement('a');
                a.href = url;
                a.download = name;
                a.click();
              };
              
              setTimeout(scrollBottom, 100); 
            }
          }).catch(e => {
            const imgEl = document.getElementById('img-' + data.fileId);
            if (imgEl) {
              imgEl.alt = '❌ 解密失败';
              imgEl.style.opacity = 1;
            }
          });
      }
    }).catch(()=>{});
  }
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text  = input.value.trim();
  if (!text || !ws) return;
  input.value = ''; input.style.height = 'auto';
  const {ciphertext, nonce} = await encryptText(text);
  ws.send(JSON.stringify({ type:'message', ciphertext, nonce }));
}

// ── 进度条 UI 控制函数 ──
function showProgress(text, percent) {
  const box = document.getElementById('progress-box');
  if (box) {
    box.classList.add('show');
    document.getElementById('progress-text').textContent = text;
    document.getElementById('progress-fill').style.width = percent + '%';
  }
  
  const mini = document.getElementById('mini-progress');
  if (mini) {
    mini.classList.add('show');
    document.getElementById('mini-progress-fill').style.width = percent + '%';
  }
}

function hideProgress() {
  const box = document.getElementById('progress-box');
  if (box) box.classList.remove('show');
  
  const mini = document.getElementById('mini-progress');
  if (mini) {
    mini.classList.remove('show');
    setTimeout(() => document.getElementById('mini-progress-fill').style.width = '0%', 200);
  }
}
// ═══════════════════════════════════════
//  CRYPTO
// ═══════════════════════════════════════
async function encryptText(text) {
  const nonce     = crypto.getRandomValues(new Uint8Array(12));
  const encoded   = new TextEncoder().encode(text);
  const cipherBuf = await crypto.subtle.encrypt({name:'AES-GCM', iv:nonce}, aesKey, encoded);
  return { ciphertext: bytesToHex(new Uint8Array(cipherBuf)), nonce: bytesToHex(nonce) };
}
async function decryptText(ciphertextHex, nonceHex) {
  const ct    = hexToBytes(ciphertextHex);
  const nonce = hexToBytes(nonceHex);
  const plain = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, aesKey, ct);
  return new TextDecoder().decode(plain);
}
async function sha256hex(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return bytesToHex(new Uint8Array(buf));
}
function hexToBytes(hex) {
  const arr = new Uint8Array(hex.length/2);
  for (let i=0;i<arr.length;i++) arr[i]=parseInt(hex.slice(i*2,i*2+2),16);
  return arr;
}
function bytesToHex(bytes) { return Array.from(bytes).map(b=>b.toString(16).padStart(2,'0')).join(''); }

// ═══════════════════════════════════════
//  SEND FILE (带进度条版)
// ═══════════════════════════════════════
async function sendFile(file) {
  if (!file) return;
  if (file.size > 500*1024*1024) { toast('文件超过 500MB'); return; }
  
  showProgress(`加密中...`, 0); // 第一步：本地加密
  
  const buf       = await file.arrayBuffer();
  const fileNonce = crypto.getRandomValues(new Uint8Array(12));
  const encBuf    = await crypto.subtle.encrypt({name:'AES-GCM', iv:fileNonce}, aesKey, buf);
  const nameEnc   = await encryptText(file.name);
  
  const form      = new FormData();
  form.append('file',         new Blob([encBuf], {type:'application/octet-stream'}), 'enc');
  form.append('sender',       myNick);
  form.append('filename_enc', nameEnc.ciphertext);
  form.append('nonce',        nameEnc.nonce);
  form.append('file_nonce',   bytesToHex(fileNonce));
  form.append('auth_token',   authToken);

  // 第二步：使用 XMLHttpRequest 追踪上传进度
  const xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/upload');
  
  xhr.upload.onprogress = e => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      showProgress(`上传中... ${pct}%`, pct);
    }
  };
  
  xhr.onload = () => {
    hideProgress();
    if (xhr.status === 200) toast('✓ 发送成功');
    else toast('上传失败');
    document.getElementById('file-input').value = '';
  };
  
  xhr.onerror = () => { hideProgress(); toast('上传失败'); };
  xhr.send(form);
}

// ═══════════════════════════════════════
//  DOWNLOAD FILE
// ═══════════════════════════════════════
async function downloadFile(fileId, fileNonceHex, filenameEnc, nameNonceHex) {
  const xhr = new XMLHttpRequest();
  xhr.open('GET', `/api/download/${fileId}`);
  xhr.responseType = 'arraybuffer'; // 确保接收为二进制 Buffer

  xhr.onprogress = e => {
    if (e.lengthComputable) {
      const pct = Math.round((e.loaded / e.total) * 100);
      showProgress(`下载中... ${pct}%`, pct);
    }
  };

  xhr.onload = async () => {
    if (xhr.status === 200) {
      showProgress(`解密中...`, 100);
      try {
        const encBuf = xhr.response;
        const nonce  = hexToBytes(fileNonceHex);
        const plain  = await crypto.subtle.decrypt({name:'AES-GCM', iv:nonce}, aesKey, encBuf);
        
        let filename = 'file';
        try { filename = await decryptText(filenameEnc, nameNonceHex); } catch(e){}
        
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob([plain]));
        a.download = filename; a.click();
        
        hideProgress();
        toast('✓ 解密完成');
      } catch(e) { hideProgress(); toast('解密失败'); }
    } else {
      hideProgress(); toast('下载失败');
    }
  };
  
  xhr.onerror = () => { hideProgress(); toast('下载失败'); };
  xhr.send();
}

function updateUsers(users) {

  document.getElementById('user-list').innerHTML = users.map(u =>
    `<div class="user-item">
      <div class="user-avatar">${esc(u.avatar || '😊')}</div>
      <div style="display:flex;flex-direction:column;min-width:0">
        <span class="user-name" style="color:${esc(u.color)}">${esc(u.nickname)}</span>
      </div>
    </div>`
  ).join('');
}
function scrollBottom() { const el=document.getElementById('messages'); el.scrollTop=el.scrollHeight; }
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatBytes(b) {
  if (b<1024) return b+' B';
  if (b<1048576) return (b/1024).toFixed(1)+' KB';
  return (b/1048576).toFixed(1)+' MB';
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer); toastTimer = setTimeout(()=>el.classList.remove('show'), 2500);
}

// ── QR
async function showQR() {
  openModal('qr-modal');
  try {
    const res  = await fetch('/api/qr');
    const data = await res.json();
    document.getElementById('qr-img').src = data.qr;
    document.getElementById('qr-sub').textContent = '用其他设备扫码加入同一局域网';

function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'qr-modal') showQR();
  if (id === 'settings-modal') buildThemePickers();
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target.id === id) closeModal(id); }

// ── Drag
function setupDrop() {
  const overlay = document.getElementById('drag-overlay');
  let cnt = 0;
  document.addEventListener('dragenter', e=>{e.preventDefault(); cnt++; overlay.classList.add('show');});
  document.addEventListener('dragleave', ()=>{if(--cnt<=0){cnt=0;overlay.classList.remove('show');}});
  document.addEventListener('dragover',  e=>e.preventDefault());
  document.addEventListener('drop', e=>{
    e.preventDefault(); cnt=0; overlay.classList.remove('show');
    const f = e.dataTransfer.files[0]; if (f) sendFile(f);
  });
}

function setupPaste() {
  document.addEventListener('paste', e => {

    if (!document.getElementById('app').classList.contains('active')) return;

    const items = (e.clipboardData || window.clipboardData).items;
    for (let item of items) {
      if (item.type.startsWith('image/')) {
        const file = item.getAsFile();
        if (file) {
          const ext = file.type === 'image/jpeg' ? '.jpg' : '.png';
          const fileName = file.name === 'image.png' ? `截图_${new Date().getTime()}${ext}` : file.name;
          
          const newFile = new File([file], fileName, { type: file.type });
          
          sendFile(newFile);
        }
        break; 
      }
    }
  });
}
